    <div class="container" style="margin-top:20px">
        <div class="row">
          <div class="col-lg-2">
            <div class="card"  style="background-color: #DAC1AE;height:100px ;border-radius: 23px;">
            <div class="card-body">
                <p class="card-text" ><p id="usd" style="font-size:11px" ></p></p>
              </div>
            </div>
          </div>
          <div class="col-lg-2">
            <div class="card"  style="background-color: #DAC1AE;height:100px;border-radius: 23px;">
            <div class="card-body">
                <p class="card-text"style="font-size:11px" ><p id="eur" style="font-size:11px" ></p></p>
              </div>
            </div>
          </div>
          <div class="col-lg-2">
            <div class="card"  style="background-color: #DAC1AE ;height:100px; border-radius: 23px;">
            <div class="card-body">
                <p class="card-text" style="font-size:11px"><p id="sek" style="font-size:11px" ></p></p>
              </div>
            </div>
          </div>
          <div class="col-lg-2">
            <div class="card"  style="background-color: #DAC1AE; height:100px; border-radius: 23px;">

                <p class="card-text" ><p id="jpy" style="font-size:11px" ></p></p>
              </div>
            </div>
          </div>
          <div class="col-lg-2">
            <div class="card"  style="background-color: #DAC1AE; height:100px;border-radius: 23px;">
            <div class="card-body">
                <p class="card-text" style="font-size:11px"><p id="cad" style="font-size:11px">Доллар</p></p>
              </div>
            </div>
          </div>



   
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
$.getJSON("https://www.cbr-xml-daily.ru/daily_json.js", function(data) {
    $('#usd').html(data.Valute.USD.Nominal+" Доллар -> "+ data.Valute.USD.Value+" Рублей");
    $('#eur').html(data.Valute.EUR.Nominal+"Евро -> "+ data.Valute.EUR.Value+" Рублей");
    $('#sek').html(data.Valute.SEK.Nominal+"Шведский франк -> "+ data.Valute.SEK.Value+" Рублей");
    $('#jpy').html(data.Valute.JPY.Nominal+"Японский иен -> "+ data.Valute.JPY.Value+" Рублей");
    $('#cad').html(data.Valute.CAD.Nominal+"Канадский доллар -> "+ data.Valute.CAD.Value+" Рублей");
    
});
fetch('http://api.openweathermap.org/data/2.5/weather?id=524894&lang=ru&appid=edc13c38c238120c76fce0cb7e8a8d6e').then(function (resp) {return resp.json() }).then(function (data) {
    //добавляем название города
    document.querySelector('.weather__city').textContent = data.name;
    //data.main.temp содержит значение в Кельвинах, отнимаем от  273, чтобы получить значение в градусах Цельсия
    document.querySelector('.weather__forecast').innerHTML = Math.round(data.main.temp - 273) + '&deg;';
    //Добавляем описание погоды
    document.querySelector('.weather__desc').textContent = data.weather[0]['description'];
    })
    .catch(function () {
        //Обрабатываем ошибки
    });

  $.ajax("https://www.cbr-xml-daily.ru/daily_json.js");
  $.ajax('http://api.openweathermap.org/data/2.5/weather?id=524894&lang=ru&appid=edc13c38c238120c76fce0cb7e8a8d6e');
</script>

</body>
